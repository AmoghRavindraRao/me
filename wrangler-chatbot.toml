# Wrangler configuration for chatbot worker
name = "chatbot-api"
main = "worker/chatbot.js"
compatibility_date = "2024-01-01"

# Environment variables
[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

# Secrets (set via `wrangler secret put`)
# OPENROUTER_API_KEY - Your OpenRouter API key

# Routes (optional - uncomment to customize)
# routes = [
#   { pattern = "chatbot-api.amogh-portfolio.workers.dev/*", zone_id = "your_zone_id" }
# ]
